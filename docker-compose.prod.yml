version: "3.8"

services:
  pricing-db:
    image: postgres:16-alpine
    container_name: pricing-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pricing
      POSTGRES_USER: pricing_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?err}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricing_user -d pricing"]
      interval: 5s
      timeout: 5s
      retries: 5

  pricing-api:
    image: ghcr.io/wendykatherine/pricing-service:latest
    container_name: pricing-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      DATABASE_URL: postgres://pricing_user:${DB_PASSWORD:?err}@pricing-db:5432/pricing
    depends_on:
      pricing-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
